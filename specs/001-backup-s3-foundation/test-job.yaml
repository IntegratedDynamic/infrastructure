apiVersion: batch/v1
kind: Job
metadata:
  name: backup-probe
  namespace: backup
spec:
  ttlSecondsAfterFinished: 300
  template:
    spec:
      restartPolicy: Never
      containers:
        - name: probe
          image: scaleway/cli:latest
          command:
            - sh
            - -c
            - |
              echo "probe-$(date +%s)" > /tmp/probe.txt
              scw object put /tmp/probe.txt bucket=$BUCKET_NAME key=probe/$(date +%s).txt
              echo "Done."
          env:
            - name: BUCKET_NAME
              value: backup-dev-id
            - name: SCW_DEFAULT_REGION
              value: fr-par
            - name: SCW_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: backup-workload-credentials
                  key: access_key
            - name: SCW_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: backup-workload-credentials
                  key: secret_key
